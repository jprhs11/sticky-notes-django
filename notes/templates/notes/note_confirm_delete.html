{% extends 'base.html' %}

{% block content %}
<div class="alert alert-danger">
    <h3>Are you sure you want to delete "{{ object.title }}"?</h3>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Confirm Delete</button>
        <a href="{% url 'note_list' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
